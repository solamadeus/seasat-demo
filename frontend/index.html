<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SeaSat Demo Portal</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { margin: 0; font-family: Arial, sans-serif; }
    #topbar { padding: 12px 16px; border-bottom: 1px solid #ddd; }
    #map { height: calc(100vh - 78px); }
    .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    input, button { padding: 8px; }
  </style>
</head>
<body>
  <div id="topbar">
    <div class="row">
      <strong>SeaSat demo</strong>
      <label>Date <input id="dateInput" type="date" /></label>
      <button id="runBtn">Load demo</button>
      <span id="status"></span>
    </div>
  </div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/frontend/app.js"></script>
</body>
</html>
